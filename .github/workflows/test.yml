name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.19, 22.12, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ matrix.node-version }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: cd packages/plugin && bun run build
      - run: cd packages/plugin && bun run typecheck
      - run: cd packages/plugin && bun run test

  unit-extended:
    needs: unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.19, 22.12, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ matrix.node-version }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: cd packages/plugin && bun run build
      - run: cd packages/plugin && bun run test:unit-extended

  harness:
    needs: unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.19, 22.12, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            test-apps/*/node_modules
          key: ${{ runner.os }}-bun-harness-${{ matrix.node-version }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run test:harness
