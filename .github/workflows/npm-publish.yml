name: Publish Package

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Vite 7/8 require Node ^20.19 || ^22.12 || >=24
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            test-apps/*/node_modules
          key: ${{ runner.os }}-bun-publish-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-publish-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build
        run: cd packages/plugin && bun run build

      - name: Unit tests
        run: cd packages/plugin && bun run test

      - name: Unit-extended tests (Wave 1+)
        run: cd packages/plugin && bun run test:unit-extended

      - name: Cross-framework harness
        run: bun run test:harness

      - name: Copy README to plugin package
        run: cp README.md packages/plugin/README.md

      - name: Copy LICENSE to plugin package
        run: cp LICENSE packages/plugin/LICENSE

      - name: Publish Package
        run: cd packages/plugin && npm publish
